$kind: http-request
name: Get All Exercises
method: GET
url: "{{baseUrl}}/exercises"
description: Retrieve all exercises from the database
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });
      pm.test("Each exercise has required fields", function () {
        const json = pm.response.json();
        json.forEach(function(exercise) {
          pm.expect(exercise).to.have.property("id");
          pm.expect(exercise).to.have.property("category");
          pm.expect(exercise).to.have.property("created_at");
          pm.expect(exercise).to.have.property("updated_at");
        });
      });
