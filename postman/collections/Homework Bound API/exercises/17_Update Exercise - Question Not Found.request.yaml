$kind: http-request
name: "Update Exercise - Question Not Found"
method: PUT
url: "{{baseUrl}}/exercises/{{exerciseId}}"
description: Attempt to update an exercise referencing a question UUID that does not exist in the database
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "category": "grammar",
      "context": "Some context.",
      "questions": ["00000000-0000-0000-0000-000000000000"]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400", function () {
        pm.response.to.have.status(400);
      });
      pm.test("Response has error field", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("error");
      });
      pm.test("Error message indicates question not found", function () {
        const json = pm.response.json();
        pm.expect(json.error).to.eql("One or more question IDs do not exist");
      });
