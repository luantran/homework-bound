name: API tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      DB_ENV: local
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homework_bound
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homework_bound
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: "npm ci"

      - name: Run migrations
        run: npm run db:migrate

      - name: Run Vitest tests
        run: npm test -w @homework-bound/api

      - name: Start API server
        run: npm run dev -w @homework-bound/api &

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Install Postman CLI
        run: npm install -g postman-cli

      - name: Run Postman collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: postman collection run "postman/collections/Homework Bound API" --environment "postman/environments/homework-bound.environment.yaml"
